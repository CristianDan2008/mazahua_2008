{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Yo Chill - Plantas Medicinales{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'main.css' %}" />
    <style>
        /* Navbar Plantas Verdes */
        .navbar-mazahua {
            background: linear-gradient(90deg, #1F4E2F 0%, #3D7F30 50%, #7CB342 100%);
            background-size: 200% 100%;
            animation: gradientShift 8s ease infinite;
            box-shadow: 0 8px 20px rgba(31, 78, 47, 0.4);
            border-bottom: 4px solid #1F4E2F;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }
        
        .navbar-brand-mazahua {
            font-size: 2em;
            font-weight: bold;
            color: white !important;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        /* Footer Plantas Verdes */
        .footer-mazahua {
            background: linear-gradient(135deg, #1F4E2F 0%, #3D7F30 50%, #7CB342 100%);
            color: white !important;
            border-top: 4px dashed #7CB342;
            padding: 30px 0;
        }
        
        .footer-mazahua p {
            color: white !important;
            font-weight: bold;
        }
        
        /* Hero Section */
        .hero-mazahua {
            background: linear-gradient(135deg, #1F4E2F 0%, #3D7F30 50%, #7CB342 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 30px rgba(31, 78, 47, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .hero-mazahua::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255, 255, 255, 0.1) 35px, rgba(255, 255, 255, 0.1) 70px);
            pointer-events: none;
        }
        
        .hero-Title {
            position: relative;
            z-index: 1;
            font-size: 3rem;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            font-weight: 900;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { 
                text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3), 0 0 20px rgba(124, 179, 66, 0.5);
            }
            50% { 
                text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3), 0 0 40px rgba(124, 179, 66, 0.8);
            }
        }
        
        .hero-subtitle {
            position: relative;
            z-index: 1;
            font-size: 1.3rem;
            font-weight: bold;
        }

        /* ===== FONDO ANIMADO CON HOJAS CAYENDO COMO PLUMAS ===== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #FFFACD 0%, #F5FFF5 50%, #E8F5E8 100%);
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        /* Contenedor de partículas flotantes */
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        /* ===== HOJAS CAYENDO COMO PLUMAS ===== */
        .leaf-particle {
            position: absolute;
            font-size: 3.5rem;
            animation: fallingLeaf ease-in-out infinite;
            opacity: 0.7;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
        }

        .leaf-particle:nth-child(1) { 
            left: 5%; 
            animation-duration: 12s; 
            animation-delay: 0s;
            font-size: 4rem;
        }
        .leaf-particle:nth-child(2) { 
            left: 12%; 
            animation-duration: 14s; 
            animation-delay: 1s;
            font-size: 3.5rem;
        }
        .leaf-particle:nth-child(3) { 
            left: 20%; 
            animation-duration: 13s; 
            animation-delay: 2s;
            font-size: 3.8rem;
        }
        .leaf-particle:nth-child(4) { 
            left: 30%; 
            animation-duration: 15s; 
            animation-delay: 0.5s;
            font-size: 3.3rem;
        }
        .leaf-particle:nth-child(5) { 
            left: 40%; 
            animation-duration: 13.5s; 
            animation-delay: 3s;
            font-size: 3.7rem;
        }
        .leaf-particle:nth-child(6) { 
            left: 50%; 
            animation-duration: 14.5s; 
            animation-delay: 1.5s;
            font-size: 3.6rem;
        }
        .leaf-particle:nth-child(7) { 
            left: 60%; 
            animation-duration: 12.5s; 
            animation-delay: 2.5s;
            font-size: 3.4rem;
        }
        .leaf-particle:nth-child(8) { 
            left: 70%; 
            animation-duration: 15.5s; 
            animation-delay: 0.8s;
            font-size: 3.9rem;
        }
        .leaf-particle:nth-child(9) { 
            left: 80%; 
            animation-duration: 13.8s; 
            animation-delay: 3.5s;
            font-size: 3.5rem;
        }

        @keyframes fallingLeaf {
            0% {
                top: -100px;
                opacity: 0;
                transform: rotateZ(0deg) translateX(0);
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                top: 100vh;
                opacity: 0;
                transform: rotateZ(720deg) translateX(100px);
            }
        }

        /* Ramas sutiles */
        .branch-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .branch {
            position: absolute;
            background: linear-gradient(to top, rgba(31, 78, 47, 0.3), rgba(31, 78, 47, 0.05));
            transform-origin: bottom;
            border-radius: 50%;
        }

        /* Rama izquierda principal */
        .branch-left-1 {
            width: 8px;
            height: 200px;
            left: 0;
            bottom: 0;
            animation: growBranch 6s ease-in-out infinite;
        }

        /* Rama izquierda secundaria 1 */
        .branch-left-2 {
            width: 5px;
            height: 120px;
            left: 20px;
            bottom: 100px;
            animation: growBranch 5s ease-in-out infinite 0.5s;
            opacity: 0.5;
        }

        /* Rama izquierda secundaria 2 */
        .branch-left-3 {
            width: 5px;
            height: 100px;
            left: 10px;
            bottom: 150px;
            animation: growBranch 5.5s ease-in-out infinite 1s;
            opacity: 0.4;
        }

        /* Rama derecha principal */
        .branch-right-1 {
            width: 8px;
            height: 220px;
            right: 0;
            bottom: 0;
            animation: growBranch 6.5s ease-in-out infinite 0.3s;
        }

        /* Rama derecha secundaria 1 */
        .branch-right-2 {
            width: 5px;
            height: 130px;
            right: 25px;
            bottom: 110px;
            animation: growBranch 5.5s ease-in-out infinite 0.8s;
            opacity: 0.5;
        }

        /* Rama derecha secundaria 2 */
        .branch-right-3 {
            width: 5px;
            height: 110px;
            right: 15px;
            bottom: 160px;
            animation: growBranch 5s ease-in-out infinite 1.3s;
            opacity: 0.4;
        }

        /* Rama central */
        .branch-center {
            width: 4px;
            height: 150px;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            animation: growBranch 5.8s ease-in-out infinite 1.5s;
            opacity: 0.3;
        }

        @keyframes growBranch {
            0%, 100% {
                height: 0;
                opacity: 0;
            }
            10% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                height: 0;
                opacity: 0;
            }
        }

        /* Hojas en las ramas */
        .leaf-on-branch {
            position: absolute;
            font-size: 1.2rem;
            animation: leafSway 3s ease-in-out infinite;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.1));
        }

        .leaf-on-branch:nth-child(1) { left: 5px; bottom: 50px; animation-delay: 0s; }
        .leaf-on-branch:nth-child(2) { right: 8px; bottom: 60px; animation-delay: 0.3s; }
        .leaf-on-branch:nth-child(3) { left: 25px; bottom: 80px; animation-delay: 0.6s; }
        .leaf-on-branch:nth-child(4) { right: 30px; bottom: 90px; animation-delay: 0.9s; }
        .leaf-on-branch:nth-child(5) { left: 15px; bottom: 120px; animation-delay: 1.2s; }
        .leaf-on-branch:nth-child(6) { right: 20px; bottom: 130px; animation-delay: 1.5s; }

        @keyframes leafSway {
            0%, 100% {
                transform: translateX(0) rotate(0deg);
                opacity: 0.6;
            }
            25% {
                transform: translateX(8px) rotate(5deg);
                opacity: 0.8;
            }
            50% {
                transform: translateX(-5px) rotate(-3deg);
                opacity: 0.8;
            }
            75% {
                transform: translateX(8px) rotate(5deg);
                opacity: 0.7;
            }
        }
    </style>

</head>
<body>
    <!-- Fondo Animado avec Hojas Cayendo Como Plumas -->
    <div class="animated-bg"></div>
    
    <!-- Ramas Crecientes Sutiles -->
    <div class="branch-container">
        <div class="branch branch-left-1"></div>
        <div class="branch branch-left-2"></div>
        <div class="branch branch-left-3"></div>
        <div class="branch branch-right-1"></div>
        <div class="branch branch-right-2"></div>
        <div class="branch branch-right-3"></div>
        <div class="branch branch-center"></div>
        
        <!-- Hojas en las ramas -->
        <div class="leaf-on-branch">🍃</div>
        <div class="leaf-on-branch">🌿</div>
        <div class="leaf-on-branch">🍃</div>
        <div class="leaf-on-branch">🌿</div>
        <div class="leaf-on-branch">🍃</div>
        <div class="leaf-on-branch">🌿</div>
    </div>

    <!-- Hojas Cayendo Como Plumas -->
    <div class="floating-particles">
        <div class="leaf-particle">🍃</div>
        <div class="leaf-particle">🌿</div>
        <div class="leaf-particle">🍂</div>
        <div class="leaf-particle">🌱</div>
        <div class="leaf-particle">🍃</div>
        <div class="leaf-particle">🌿</div>
        <div class="leaf-particle">🍂</div>
        <div class="leaf-particle">🌱</div>
        <div class="leaf-particle">🍃</div>
    </div>

    <!-- Navbar Colorido Mazahua -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-mazahua">
        <div class="container">
            <a class="navbar-brand navbar-brand-mazahua" href="{% url 'inicio' %}">
                <i class="fas fa-leaf" style="margin-right: 10px; color: #FFFACD;"></i>Yo Chill
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="{% url 'inicio' %}" style="color: white !important; font-size: 1.1em;">🌿 Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="{% url 'plantas-completas' %}" style="color: white !important; font-size: 1.1em; margin-left: 20px;">📚 Plantas Completas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main style="margin-top: 80px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer Mazahua -->
    <footer class="footer-mazahua text-center">
        <div class="container">
            <p>&copy; 2026 <strong>Yo Chill</strong> - Plantas Medicinales Mazahuas 🌿</p>
            <p style="font-size: 0.9em; margin-top: 10px;">Honrando la sabiduría tradicional de la medicina indígena</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
