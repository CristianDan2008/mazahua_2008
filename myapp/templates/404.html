{% extends 'base.html' %}

{% block title %}Página no encontrada - Yo Chill{% endblock %}

{% block content %}

<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
  <div style="text-align: center; padding: 40px;">
    <h1 style="font-size: 5em; color: #1f4e2f; margin: 0; font-weight: bold;">404</h1>
    <h2 style="color: #3d7f30; font-size: 2em; margin-top: 20px;">Planta no encontrada</h2>
    <p style="color: #666; font-size: 1.1em; margin: 20px 0 30px 0; max-width: 600px;">
      La planta que buscas no existe en nuestro catálogo. 
      Pero puedes explorar todas nuestras plantas medicinales.
    </p>
    <a href="/plantas/" style="
      display: inline-block;
      background: #1f4e2f;
      color: white;
      padding: 15px 40px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1em;
      transition: all 0.3s ease;
    " onmouseover="this.style.background='#3d7f30'; this.style.transform='scale(1.05)';" 
       onmouseout="this.style.background='#1f4e2f'; this.style.transform='scale(1)';">
      🌿 Ver Catálogo Completo
    </a>
  </div>
</div>

{% endblock %}
